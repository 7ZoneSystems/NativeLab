name: Deploy Site

on:
  push:
    branches: [main]
    paths:
      - 'nativelab-site/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: nativelab-site/package-lock.json

      - name: Install
        working-directory: nativelab-site
        run: npm ci

      - name: Build
        working-directory: nativelab-site
        run: npm run build

      - name: Copy sub-pages into dist
        run: |
          cp features.html dist/ 2>/dev/null || true
          cp phonolab.html dist/ 2>/dev/null || true
          cp pipeline.html dist/ 2>/dev/null || true
          cp docs-user.html dist/ 2>/dev/null || true
          cp docs-dev.html dist/ 2>/dev/null || true
          cp compare.html dist/ 2>/dev/null || true
          cp setup.html dist/ 2>/dev/null || true
          cp site.css dist/ 2>/dev/null || true
          cp site.js dist/ 2>/dev/null || true
          cp -r images dist/ 2>/dev/null || true
        working-directory: nativelab-site

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: nativelab-site/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
