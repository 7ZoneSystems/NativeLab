name: Deploy Site

on:
  push:
    branches: [main]
    paths:
      - 'nativelab-site/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: nativelab-site/package-lock.json

      - name: Install
        working-directory: nativelab-site
        run: npm ci

      - name: Build
        working-directory: nativelab-site
        run: npm run build

      - name: Copy assets to dist
        run: |
          cd nativelab-site
          cp -f features.html dist/ 2>/dev/null || true
          cp -f phonolab.html dist/ 2>/dev/null || true
          cp -f pipeline.html dist/ 2>/dev/null || true
          cp -f docs-user.html dist/ 2>/dev/null || true
          cp -f docs-dev.html dist/ 2>/dev/null || true
          cp -f compare.html dist/ 2>/dev/null || true
          cp -f setup.html dist/ 2>/dev/null || true
          cp -f site.css dist/ 2>/dev/null || true
          cp -f site.js dist/ 2>/dev/null || true
          [ -d images ] && cp -r images dist/ || true
          [ -d public/docs ] && cp -r public/docs dist/ || true
          [ -d public/PhonoLab ] && cp -r public/PhonoLab dist/ || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: nativelab-site/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
