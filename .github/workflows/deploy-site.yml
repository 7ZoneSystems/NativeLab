name: Deploy Site

on:
  push:
    branches: [main]
    paths:
      - 'nativelab-site/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: nativelab-site/package-lock.json

      - name: Install
        working-directory: nativelab-site
        run: npm ci

      - name: Build
        working-directory: nativelab-site
        run: npm run build

      - name: Copy sub-pages and assets into dist
        working-directory: nativelab-site
        run: |
          for f in features.html phonolab.html pipeline.html docs-user.html docs-dev.html compare.html setup.html site.css site.js; do
            [ -f "$f" ] && cp "$f" dist/
          done
          [ -d images ] && cp -r images dist/
          [ -d public/docs ] && cp -r public/docs dist/
          [ -d public/PhonoLab ] && cp -r public/PhonoLab dist/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: nativelab-site/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
