name: Build Linux App

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    name: Linux x86_64
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system libraries for PyQt6
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 \
            libgl1 \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-xfixes0 \
            libxcb-xinerama0 \
            libxcb-xinput0

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install . pyinstaller pyinstaller-hooks-contrib

      - name: Build app
        run: python -m PyInstaller NativeLab.spec --noconfirm --clean

      - name: Verify llama.cpp runtime is not bundled
        run: |
          if find dist/NativeLab -type f \( -name "llama-*" -o -name "libllama*" -o -name "libggml*" \) | grep .; then
            echo "Unexpected llama.cpp runtime binary found in artifact"
            exit 1
          fi

      - name: Package artifact
        run: |
          mkdir -p artifacts
          tar -C dist -czf artifacts/NativeLab-linux-x86_64.tar.gz NativeLab

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NativeLab-linux-x86_64
          path: artifacts/NativeLab-linux-x86_64.tar.gz
          if-no-files-found: error
          retention-days: 30
