name: Build macOS App

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    name: macOS ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            arch: x86_64
          - runner: macos-14
            arch: arm64

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install . pyinstaller pyinstaller-hooks-contrib

      - name: Generate macOS icon
        run: |
          mkdir -p nativelab/icon.iconset
          sips -z 16 16 nativelab/icon.png --out nativelab/icon.iconset/icon_16x16.png
          sips -z 32 32 nativelab/icon.png --out nativelab/icon.iconset/icon_16x16@2x.png
          sips -z 32 32 nativelab/icon.png --out nativelab/icon.iconset/icon_32x32.png
          sips -z 64 64 nativelab/icon.png --out nativelab/icon.iconset/icon_32x32@2x.png
          sips -z 128 128 nativelab/icon.png --out nativelab/icon.iconset/icon_128x128.png
          sips -z 256 256 nativelab/icon.png --out nativelab/icon.iconset/icon_128x128@2x.png
          sips -z 256 256 nativelab/icon.png --out nativelab/icon.iconset/icon_256x256.png
          sips -z 512 512 nativelab/icon.png --out nativelab/icon.iconset/icon_256x256@2x.png
          sips -z 512 512 nativelab/icon.png --out nativelab/icon.iconset/icon_512x512.png
          sips -z 1024 1024 nativelab/icon.png --out nativelab/icon.iconset/icon_512x512@2x.png
          iconutil -c icns nativelab/icon.iconset -o nativelab/icon.icns

      - name: Build app bundle
        run: python -m PyInstaller NativeLab.spec --noconfirm --clean

      - name: Verify llama.cpp runtime is not bundled
        run: |
          if find dist/NativeLab.app -type f \( -name "llama-*" -o -name "libllama*" -o -name "libggml*" \) | grep .; then
            echo "Unexpected llama.cpp runtime binary found in artifact"
            exit 1
          fi

      - name: Ad-hoc sign app bundle
        run: codesign --force --deep --sign - dist/NativeLab.app

      - name: Package artifact
        run: |
          mkdir -p artifacts
          ditto -c -k --keepParent dist/NativeLab.app artifacts/NativeLab-macOS-${{ matrix.arch }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NativeLab-macOS-${{ matrix.arch }}
          path: artifacts/NativeLab-macOS-${{ matrix.arch }}.zip
          if-no-files-found: error
          retention-days: 30
