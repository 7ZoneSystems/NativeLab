name: Track GitHub clones

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  clones:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest clone count from GitHub API
        env:
          PERSONAL_TOKEN: ${{ secrets.PERSONAL_TOKEN }}
        run: |
          curl -fsSL \
            -H "Authorization: Bearer $PERSONAL_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/traffic/clones" \
            -o clone.json

      - name: Download previous gist data
        run: |
          if ! curl -fsSL \
            "https://gist.githubusercontent.com/${{ github.repository_owner }}/${{ secrets.GIST_ID }}/raw/clone.json" \
            -o clone_before.json; then
            echo '{"count":0,"clones":[]}' > clone_before.json
          fi

          python3 - <<'PY'
          import json
          from pathlib import Path

          path = Path("clone_before.json")
          try:
              data = json.loads(path.read_text())
              if not isinstance(data, dict) or "clones" not in data:
                  raise ValueError("bad json")
          except Exception:
              path.write_text('{"count":0,"clones":[]}')
          PY

      - name: Merge cumulative total
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          current = json.loads(Path("clone.json").read_text())
          before = json.loads(Path("clone_before.json").read_text())

          merged = {}
          for item in before.get("clones", []):
              ts = item.get("timestamp")
              if ts:
                  merged[ts] = item

          for item in current.get("clones", []):
              ts = item.get("timestamp")
              if ts:
                  merged[ts] = item

          output = {
              "count": sum(int(item.get("count", 0)) for item in merged.values()),
              "clones": sorted(merged.values(), key=lambda x: x["timestamp"])
          }

          Path("clone.json").write_text(json.dumps(output, indent=2))
          print(json.dumps(output, indent=2))
          PY

      - name: Update gist with new total
        env:
          PERSONAL_TOKEN: ${{ secrets.PERSONAL_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          content = Path("clone.json").read_text()

          payload = {
              "description": "${{ github.repository }} clone statistics",
              "files": {
                  "clone.json": {
                      "content": content
                  }
              }
          }

          Path("post_clone.json").write_text(json.dumps(payload))
          PY

          curl -fsS -X PATCH \
            --user "${{ github.actor }}:${{ secrets.PERSONAL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d @post_clone.json \
            "https://api.github.com/gists/${{ secrets.GIST_ID }}" >/dev/null