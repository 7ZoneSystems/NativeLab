name: Build Windows App

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Windows x86_64
    runs-on: windows-2022

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install . pyinstaller pyinstaller-hooks-contrib

      - name: Build app
        shell: pwsh
        run: python -m PyInstaller NativeLab.spec --noconfirm --clean

      - name: Verify llama.cpp runtime is not bundled
        shell: pwsh
        run: |
          $matches = Get-ChildItem -Path dist\NativeLab -Recurse -File |
            Where-Object {
              $_.Name -like "llama-*" -or
              $_.Name -like "libllama*" -or
              $_.Name -like "libggml*"
            }
          if ($matches) {
            $matches | Select-Object -ExpandProperty FullName
            throw "Unexpected llama.cpp runtime binary found in artifact"
          }

      - name: Package artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifacts -Force | Out-Null
          Compress-Archive -Path dist\NativeLab -DestinationPath artifacts\NativeLab-windows-x86_64.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NativeLab-windows-x86_64
          path: artifacts/NativeLab-windows-x86_64.zip
          if-no-files-found: error
          retention-days: 30
