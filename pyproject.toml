[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "nativelab"
version = "0.3.4"
description = "NativeLab AI framework"
readme = "README.md"
requires-python = ">=3.10"

dependencies = [
    "psutil==7.2.2",
    "pypdf>=6.1.3",
    "PyQt6==6.10.2",
    "aiohttp>=3.9.0",
    "discord.py>=2.3.2"
]

[project.optional-dependencies]
gui = [
    "PyQt6==6.10.2"
]
discord = [
    "aiohttp>=3.9.0",
    "discord.py>=2.3.2"
]
whatsapp = [
    "aiohttp>=3.9.0"
]
hf = [
    "transformers>=5.0.0",
    "torch>=2.2.0",
    "safetensors>=0.4.0",
    "accelerate>=0.30.0",
    "sentencepiece>=0.2.0",
    "pillow>=12.2.0",
    "requests>=2.33.0",
    "urllib3>=2.7.0",
    "filelock>=3.20.3"
]

[project.scripts]
nativelab = "nativelab.main:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["nativelab*"]

[tool.setuptools.package-data]
nativelab = [
    "*.png",
    "*.ico",
    "assets/icons/*.svg",
    "assets/katex/LICENSE",
    "assets/katex/*.css",
    "assets/katex/*.js",
    "assets/katex/fonts/*",
    "integrations/examples/*",
]
