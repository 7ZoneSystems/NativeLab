[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "nativelab"
version = "0.3.1"
description = "NativeLab AI framework"
readme = "README.md"
requires-python = ">=3.9"

dependencies = [
    "psutil==7.2.2",
    "PyPDF2==3.0.1",
    "PyQt6==6.10.2",
    "aiohttp>=3.9.0",
    "discord.py>=2.3.2"
]

[project.optional-dependencies]
gui = [
    "PyQt6==6.10.2"
]
discord = [
    "aiohttp>=3.9.0",
    "discord.py>=2.3.2"
]
whatsapp = [
    "aiohttp>=3.9.0"
]
hf = [
    "transformers>=4.46.0",
    "torch>=2.2.0",
    "safetensors>=0.4.0",
    "accelerate>=0.30.0",
    "sentencepiece>=0.2.0",
    "pillow>=10.0.0"
]

[project.scripts]
nativelab = "nativelab.main:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["nativelab*"]

[tool.setuptools.package-data]
nativelab = ["*.png", "*.ico", "assets/icons/*.svg", "integrations/examples/*"]
